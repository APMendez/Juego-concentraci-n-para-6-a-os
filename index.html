<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Concentración</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
}

@keyframes shake {
    0% { transform: translate3d(0,0,0); }
    25% { transform: translate3d(-10px,0,0); }
    50% { transform: translate3d(10px,0,0); }
    75% { transform: translate3d(-6px,0,0); }
    100% { transform: translate3d(0,0,0); }
}

.animate-success { animation: pop 0.3s ease; }
.animate-error { animation: shake 0.3s; }
</style>
</head>

<body class="bg-blue-100 flex items-center justify-center h-screen select-none">

<div class="text-center">

<!-- INICIO -->
<div id="startScreen">
    <h1 class="text-3xl font-bold mb-4">🎯 Elegí el color</h1>
    <div id="colorOptions" class="flex flex-wrap justify-center gap-3 mb-4"></div>
    <p class="text-lg mt-2">🏆 Victorias seguidas: <span id="wins">0</span></p>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="hidden">
    <h1 class="text-2xl font-bold mb-2">
        Tocá solo: <span id="targetColorText"></span>
    </h1>

    <button id="startBtn" class="bg-green-500 text-white px-6 py-3 rounded-xl text-xl mb-2 shadow">
        START
    </button>

    <button id="stopBtn" class="bg-red-500 text-white px-6 py-2 rounded-xl text-lg mb-2 shadow hidden">
        STOP
    </button>

    <p>Puntos: <span id="score">0</span></p>
    <p>Racha: 🔥 <span id="streak">0</span></p>
    <p class="mb-4">Intento: <span id="round">0</span>/10</p>

    <div id="gameArea" class="w-64 h-64 flex items-center justify-center rounded-2xl bg-white shadow-lg text-6xl"></div>

    <p id="feedback" class="mt-4 text-xl font-semibold"></p>
</div>

<!-- FIN -->
<div id="endScreen" class="hidden">
    <h1 class="text-3xl font-bold mb-4">🎉 Fin del juego</h1>
    <p class="text-xl mb-4">Puntaje: <span id="finalScore"></span>/10</p>
    <p class="text-lg mb-4">🏆 Victorias seguidas: <span id="finalWins"></span></p>

    <button id="playAgainBtn" class="bg-blue-500 text-white px-6 py-3 rounded-xl text-xl shadow">
        Jugar de nuevo
    </button>
</div>

</div>

<script>
const colors = [
    {name:"rojo",value:"#ef4444"},
    {name:"azul",value:"#3b82f6"},
    {name:"verde",value:"#22c55e"},
    {name:"amarillo",value:"#facc15"},
    {name:"violeta",value:"#a855f7"},
    {name:"rosa",value:"#ec4899"},
    {name:"naranja",value:"#f97316"},
    {name:"gris",value:"#6b7280"},
    {name:"negro",value:"#000"},
    {name:"celeste",value:"#06b6d4"}
];

const shapes=["●","■","▲","★"];

let targetColor=null;
let score=0;
let round=0;
let canClick=false;
let sequence=[];
let timeoutId;
let speed=1500;
let streak=0;
let wins=0;

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function beep(freq,duration){
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.frequency.value=freq;
    gain.gain.value=0.1;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime+duration);
}

function playSuccessSound(){beep(800,0.15);}
function playErrorSound(){beep(200,0.2);}

function playWinSound(){
    beep(600,0.1);
    setTimeout(()=>beep(900,0.15),120);
    setTimeout(()=>beep(1200,0.2),240);
}

function playLoseSound(){
    beep(500,0.15);
    setTimeout(()=>beep(300,0.2),150);
}

function animateSuccess(){
    gameArea.classList.add("animate-success");
    setTimeout(()=>gameArea.classList.remove("animate-success"),300);
}

function animateError(){
    gameArea.classList.add("animate-error");
    setTimeout(()=>gameArea.classList.remove("animate-error"),300);
}

// UI refs
const colorOptions=document.getElementById("colorOptions");
const startScreen=document.getElementById("startScreen");
const gameScreen=document.getElementById("gameScreen");
const endScreen=document.getElementById("endScreen");
const gameArea=document.getElementById("gameArea");
const scoreDisplay=document.getElementById("score");
const roundDisplay=document.getElementById("round");
const feedback=document.getElementById("feedback");
const finalScore=document.getElementById("finalScore");
const finalWins=document.getElementById("finalWins");
const targetColorText=document.getElementById("targetColorText");
const startBtn=document.getElementById("startBtn");
const stopBtn=document.getElementById("stopBtn");
const streakDisplay=document.getElementById("streak");
const winsDisplay=document.getElementById("wins");
const playAgainBtn=document.getElementById("playAgainBtn");

// colores
colors.forEach(c=>{
    const btn=document.createElement("button");
    btn.style.backgroundColor=c.value;
    btn.className="w-10 h-10 rounded-full border-2";

    btn.onclick=()=>{
        targetColor=c;
        document.querySelectorAll("#colorOptions button").forEach(b=>b.classList.remove("ring-4"));
        btn.classList.add("ring-4");

        startScreen.classList.add("hidden");
        gameScreen.classList.remove("hidden");
        targetColorText.textContent=c.name;
    };

    colorOptions.appendChild(btn);
});

// START
startBtn.onclick=()=>{
    score=0;
    round=0;
    streak=0;
    speed=1500;

    startBtn.style.display="none";
    stopBtn.classList.remove("hidden");

    sequence=generateSequence();
    nextRound();
};

// PLAY AGAIN (sin perder wins)
playAgainBtn.onclick=()=>{
    endScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
};

// STOP
stopBtn.onclick=()=>{
    clearTimeout(timeoutId);
    resetGame();
};

function resetGame(){
    gameScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");

    startBtn.style.display="block";
    stopBtn.classList.add("hidden");

    score=0;
    round=0;
    streak=0;
    feedback.textContent="";
}

// secuencia
function generateSequence(){
    let seq=[];
    for(let i=0;i<4;i++)seq.push(true);
    for(let i=4;i<10;i++)seq.push(Math.random()<0.5);
    return seq.sort(()=>Math.random()-0.5);
}

function updateUI(){
    scoreDisplay.textContent=score;
    streakDisplay.textContent=streak;
    winsDisplay.textContent=wins;
}

// ronda
function nextRound(){
    if(round>=10) return endGame();

    feedback.textContent="";
    canClick=true;

    const isMatch=sequence[round];
    round++;
    roundDisplay.textContent=round;

    const shape=shapes[Math.floor(Math.random()*shapes.length)];

    let color;
    if(isMatch) color=targetColor;
    else{
        const others=colors.filter(c=>c.name!==targetColor.name);
        color=others[Math.floor(Math.random()*others.length)];
    }

    gameArea.textContent=shape;
    gameArea.style.color=color.value;

    timeoutId=setTimeout(()=>{
        if(canClick){
            canClick=false;

            if(!isMatch){
                score++;
                streak++;
                speed=Math.max(750, speed - (80 + streak*10));
            }else{
                feedback.textContent="¡Se te pasó!";
                playErrorSound();
                animateError();
                streak=0;
                speed=Math.min(1500, speed + 150);
            }

            updateUI();
            timeoutId=setTimeout(nextRound,speed);
        }
    }, speed-200);
}

// CLICK
gameArea.onclick=()=>{
    if(!canClick)return;

    canClick=false;
    const isMatch=sequence[round-1];

    if(isMatch){
        score++;
        streak++;
        feedback.textContent="¡Bien!";
        playSuccessSound();
        animateSuccess();
        speed=Math.max(750, speed - (80 + streak*10));
    }else{
        feedback.textContent="¡No!";
        playErrorSound();
        animateError();
        streak=0;
        speed=Math.min(1500, speed + 150);
    }

    updateUI();
    timeoutId=setTimeout(nextRound,speed);
};

function endGame(){
    clearTimeout(timeoutId);

    if(score>=7){
        wins++;
        playWinSound();
    }else{
        wins=0;
        playLoseSound();
    }

    finalScore.textContent=score;
    finalWins.textContent=wins;
    winsDisplay.textContent=wins;

    gameScreen.classList.add("hidden");
    endScreen.classList.remove("hidden");
}
</script>

</body>
</html>
