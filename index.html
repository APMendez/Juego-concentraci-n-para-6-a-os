<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Reto</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100 flex items-center justify-center h-screen select-none">

<div class="text-center">

<!-- INICIO -->
<div id="startScreen">
    <h1 class="text-3xl font-bold mb-4">🎯 Modo Reto</h1>
    <p class="mb-2">Elegí un color:</p>
    <div id="colorOptions" class="flex flex-wrap justify-center gap-3 mb-4"></div>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="hidden">
    <h2 class="mb-2">Tocá solo: <span id="targetColorText"></span></h2>
    <p>Nivel: <span id="level"></span></p>
    <p>Puntos: <span id="score">0</span></p>
    <p>Intento: <span id="round">0</span></p>

    <button id="startBtn" onclick="beginGame()" class="bg-green-500 text-white px-6 py-2 rounded mb-2">
        START
    </button>

    <button onclick="stopGame()" class="bg-red-500 text-white px-4 py-2 rounded mb-3">
        Detener
    </button>

    <div id="gameArea" class="w-64 h-64 bg-white rounded-2xl flex items-center justify-center text-6xl shadow-lg"></div>

    <p id="feedback" class="mt-3 text-xl"></p>
</div>

<!-- FIN -->
<div id="endScreen" class="hidden">
    <h1 class="text-3xl mb-3">Resultado</h1>
    <p>Puntaje: <span id="finalScore"></span></p>
    <p>Nivel actual: <span id="finalLevel"></span></p>

    <button onclick="restart()" class="bg-blue-500 text-white px-6 py-3 rounded mt-4">
        Jugar otra vez
    </button>
</div>

</div>

<script>
// CONFIG
const MIN_ROUNDS = 5;
const MAX_ROUNDS = 10;
const MAX_TIME = 2000;
const MIN_TIME = 650;

// ESTADO GLOBAL
let level = 0;
let streak = 0;

let currentRounds, currentTime;
let targetColor;

let score, round, sequence, canClick, interval;

// DATA
const colors = [
    {name:"rojo",value:"#ef4444"},
    {name:"azul",value:"#3b82f6"},
    {name:"verde",value:"#22c55e"},
    {name:"amarillo",value:"#facc15"},
    {name:"violeta",value:"#a855f7"},
    {name:"rosa",value:"#ec4899"},
    {name:"naranja",value:"#f97316"},
    {name:"gris",value:"#6b7280"},
    {name:"negro",value:"#000"},
    {name:"celeste",value:"#06b6d4"}
];

const shapes = ["●","■","▲","★"];

// UI
const colorOptions = document.getElementById("colorOptions");
const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");

const gameArea = document.getElementById("gameArea");
const feedback = document.getElementById("feedback");

const scoreDisplay = document.getElementById("score");
const roundDisplay = document.getElementById("round");

const finalScore = document.getElementById("finalScore");
const finalLevel = document.getElementById("finalLevel");

const targetColorText = document.getElementById("targetColorText");
const levelDisplay = document.getElementById("level");

const startBtn = document.getElementById("startBtn");

// COLORES
colors.forEach(c=>{
    const btn=document.createElement("button");
    btn.style.backgroundColor=c.value;
    btn.className="w-10 h-10 rounded-full";
    btn.onclick=()=>{
        targetColor=c;
        startScreen.classList.add("hidden");
        gameScreen.classList.remove("hidden");
        targetColorText.textContent=c.name;
        levelDisplay.textContent=level;
    };
    colorOptions.appendChild(btn);
});

// DIFICULTAD
function updateDifficulty(){
    currentRounds = Math.min(MIN_ROUNDS + level, MAX_ROUNDS);

    const progress = (currentRounds - MIN_ROUNDS) / (MAX_ROUNDS - MIN_ROUNDS);
    currentTime = MAX_TIME - progress * (MAX_TIME - MIN_TIME);
}

// SECUENCIA
function generateSequence(){
    let seq=[];
    let minMatches=Math.ceil(currentRounds*0.4);

    for(let i=0;i<minMatches;i++) seq.push(true);
    for(let i=minMatches;i<currentRounds;i++) seq.push(Math.random()<0.5);

    return seq.sort(()=>Math.random()-0.5);
}

// START
function beginGame(){
    score=0;
    round=0;

    updateDifficulty();
    sequence=generateSequence();

    scoreDisplay.textContent=0;
    roundDisplay.textContent=0;

    startBtn.style.display="none";

    nextRound();
    interval=setInterval(nextRound,currentTime);
}

// STOP
function stopGame(){
    clearInterval(interval);
    streak = 0;
    level = 0;
    goToStart();
}

// RONDA
function nextRound(){
    if(round>=currentRounds){
        endGame();
        return;
    }

    feedback.textContent="";
    canClick=true;

    const isMatch=sequence[round];
    round++;

    roundDisplay.textContent=round;

    const shape=shapes[Math.floor(Math.random()*shapes.length)];

    let color;
    if(isMatch){
        color=targetColor;
    }else{
        const others=colors.filter(c=>c.name!==targetColor.name);
        color=others[Math.floor(Math.random()*others.length)];
    }

    gameArea.textContent=shape;
    gameArea.style.color=color.value;

    setTimeout(()=>{
        if(canClick){
            canClick=false;
            if(!isMatch){
                score++;
            }else{
                feedback.textContent="¡Se te pasó!";
                errorFX();
            }
            scoreDisplay.textContent=score;
        }
    }, currentTime-200);
}

// CLICK
gameArea.onclick=()=>{
    if(!canClick)return;

    canClick=false;
    const isMatch=sequence[round-1];

    if(isMatch){
        score++;
        feedback.textContent="¡Bien!";
        successFX();
    }else{
        feedback.textContent="¡No!";
        errorFX();
    }

    scoreDisplay.textContent=score;
};

// FIN
function endGame(){
    clearInterval(interval);

    // evaluar victoria perfecta
    if(score === currentRounds){
        streak++;
        level++;
    } else {
        streak = 0;
        level = 0;
    }

    gameScreen.classList.add("hidden");
    endScreen.classList.remove("hidden");

    finalScore.textContent = score + "/" + currentRounds;
    finalLevel.textContent = level;
}

// RESTART → vuelve a inicio
function restart(){
    level = 0;
    streak = 0;
    goToStart();
}

// volver al inicio limpio
function goToStart(){
    gameScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");

    targetColor = null;
    startBtn.style.display="block";
}

// FX
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function successFX(){
    gameArea.animate([{transform:"scale(1)"},{transform:"scale(1.3)"},{transform:"scale(1)"}],{duration:250});
    beep(800,0.15);
}

function errorFX(){
    gameArea.animate([{transform:"translateX(0)"},{transform:"translateX(-10px)"},{transform:"translateX(10px)"},{transform:"translateX(0)"}],{duration:300});
    beep(200,0.2,"sawtooth");
}

function beep(freq,time,type="sine"){
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=type;
    osc.frequency.value=freq;
    gain.gain.value=0.1;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime+time);
}
</script>

</body>
</html>
