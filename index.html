<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Reto</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100 flex items-center justify-center h-screen">

<div class="text-center">

<div id="startScreen">
<h1 class="text-3xl mb-4">🎯 Modo Reto</h1>
<p>Elegí un color:</p>
<div id="colorOptions" class="flex flex-wrap justify-center gap-3 mt-3"></div>
</div>

<div id="gameScreen" class="hidden">
<p>Nivel: <span id="level"></span></p>
<p>Puntos: <span id="score">0</span></p>
<p>Intento: <span id="round">0</span></p>

<button id="startBtn" onclick="beginGame()" class="bg-green-500 text-white px-4 py-2 rounded my-2">START</button>
<button onclick="stopGame()" class="bg-red-500 text-white px-4 py-2 rounded mb-3">Detener</button>

<div id="gameArea" class="w-64 h-64 bg-white flex items-center justify-center text-6xl rounded-xl shadow"></div>
<p id="feedback"></p>
</div>

<div id="endScreen" class="hidden">
<h2>Resultado</h2>
<p id="finalScore"></p>
<p id="finalLevel"></p>
<button onclick="restart()" class="bg-blue-500 text-white px-4 py-2 rounded mt-3">Jugar otra vez</button>
</div>

</div>

<script>
const colors = [
{name:"rojo",value:"#ef4444"},
{name:"azul",value:"#3b82f6"},
{name:"verde",value:"#22c55e"}
];

const shapes = ["●","■","▲"];

let level=0;
let score, round, sequence, canClick, interval, mistakes;
let currentRounds, currentTime;
let targetColor;
let timeouts=[];

const MIN_ROUNDS=5, MAX_ROUNDS=10, MAX_TIME=2000, MIN_TIME=650;

const startScreen=document.getElementById("startScreen");
const gameScreen=document.getElementById("gameScreen");
const endScreen=document.getElementById("endScreen");

const gameArea=document.getElementById("gameArea");
const feedback=document.getElementById("feedback");

const scoreDisplay=document.getElementById("score");
const roundDisplay=document.getElementById("round");
const levelDisplay=document.getElementById("level");

const finalScore=document.getElementById("finalScore");
const finalLevel=document.getElementById("finalLevel");

const startBtn=document.getElementById("startBtn");

// colores
colors.forEach(c=>{
const b=document.createElement("button");
b.style.backgroundColor=c.value;
b.className="w-10 h-10 rounded-full";
b.onclick=()=>{
targetColor=c;
startScreen.classList.add("hidden");
gameScreen.classList.remove("hidden");
levelDisplay.textContent=level;
};
colorOptions.appendChild(b);
});

function updateDifficulty(){
currentRounds=Math.min(MIN_ROUNDS+level,MAX_ROUNDS);
let p=(currentRounds-MIN_ROUNDS)/(MAX_ROUNDS-MIN_ROUNDS);
currentTime=MAX_TIME-(p*(MAX_TIME-MIN_TIME));
}

function generateSequence(){
let seq=[];
let min=Math.ceil(currentRounds*0.4);
for(let i=0;i<min;i++)seq.push(true);
for(let i=min;i<currentRounds;i++)seq.push(Math.random()<0.5);
return seq.sort(()=>Math.random()-0.5);
}

function beginGame(){
score=0; round=0; mistakes=0;
updateDifficulty();
sequence=generateSequence();

startBtn.style.display="none";

nextRound();
interval=setInterval(nextRound,currentTime);
}

function nextRound(){
if(round>=currentRounds){endGame();return;}

canClick=true;
const isMatch=sequence[round];
round++;

roundDisplay.textContent=round;

const shape=shapes[Math.floor(Math.random()*shapes.length)];
gameArea.textContent=shape;

const t=setTimeout(()=>{
if(canClick){
canClick=false;
if(!isMatch)score++;
else mistakes++;
scoreDisplay.textContent=score;
}
}, currentTime-200);

timeouts.push(t);
}

gameArea.onclick=()=>{
if(!canClick)return;
canClick=false;

const isMatch=sequence[round-1];

if(isMatch)score++;
else mistakes++;

scoreDisplay.textContent=score;
};

function endGame(){
clearInterval(interval);

// limpiar timeouts
timeouts.forEach(t=>clearTimeout(t));
timeouts=[];

if(mistakes===0) level++;
else level=0;

gameScreen.classList.add("hidden");
endScreen.classList.remove("hidden");

finalScore.textContent=score+"/"+currentRounds;
finalLevel.textContent="Nivel "+level;
}

function stopGame(){
clearInterval(interval);
timeouts.forEach(t=>clearTimeout(t));
timeouts=[];

level=0;
goStart();
}

function restart(){
level=0;
goStart();
}

function goStart(){
gameScreen.classList.add("hidden");
endScreen.classList.add("hidden");
startScreen.classList.remove("hidden");
startBtn.style.display="block";
}
</script>

</body>
</html>
