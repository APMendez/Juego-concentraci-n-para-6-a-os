<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Concentración</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100 flex items-center justify-center h-screen select-none">

<div id="app" class="text-center">

    <!-- Pantalla inicio -->
    <div id="startScreen">
        <h1 class="text-3xl font-bold mb-4">🎯 Elegí el color</h1>
        <div id="colorOptions" class="flex flex-wrap justify-center gap-3 mb-4"></div>
    </div>

    <!-- Pantalla juego -->
    <div id="gameScreen" class="hidden">
        <h1 class="text-2xl font-bold mb-2">
            Tocá solo: <span id="targetColorText"></span>
        </h1>

        <button onclick="beginRounds()" class="bg-green-500 text-white px-6 py-3 rounded-xl text-xl mb-4 shadow">
            START
        </button>

        <p>Puntos: <span id="score">0</span></p>
        <p class="mb-4">Intento: <span id="round">0</span>/10</p>

        <div id="gameArea" class="w-64 h-64 flex items-center justify-center rounded-2xl bg-white shadow-lg text-6xl">
        </div>

        <p id="feedback" class="mt-4 text-xl font-semibold"></p>
    </div>

    <!-- Pantalla final -->
    <div id="endScreen" class="hidden">
        <h1 class="text-3xl font-bold mb-4">🎉 Fin del juego</h1>
        <p class="text-xl mb-4">Puntaje: <span id="finalScore"></span>/10</p>
        <button onclick="location.reload()" class="bg-blue-500 text-white px-6 py-3 rounded-xl text-xl shadow">
            Jugar de nuevo
        </button>
    </div>

</div>

<script>
// ---------- AUDIO ----------
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSuccessSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 800;

    gain.gain.value = 0.1;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playErrorSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";
    osc.frequency.value = 200;

    gain.gain.value = 0.1;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

// ---------- ANIMACIONES ----------
function animateSuccess() {
    gameArea.animate([
        { transform: "scale(1)" },
        { transform: "scale(1.3)" },
        { transform: "scale(1)" }
    ], {
        duration: 250,
        easing: "ease-out"
    });
}

function animateError() {
    gameArea.animate([
        { transform: "translateX(0px)" },
        { transform: "translateX(-10px)" },
        { transform: "translateX(10px)" },
        { transform: "translateX(-6px)" },
        { transform: "translateX(6px)" },
        { transform: "translateX(0px)" }
    ], {
        duration: 300
    });
}

// ---------- MODIFICACIONES CLAVE ----------

// ocultar botón start
const startButton = document.querySelector("button[onclick='beginRounds()']");

function beginRounds() {
    score = 0;
    round = 0;
    scoreDisplay.textContent = score;

    startButton.style.display = "none"; // 👈 ocultar

    sequence = generateSequence();
    nextRound();

    interval = setInterval(nextRound, 2000);
}

// CLICK
gameArea.addEventListener("click", () => {
    if (!canClick) return;

    canClick = false;

    const isMatch = sequence[round - 1];

    if (isMatch) {
        score++;
        feedback.textContent = "¡Bien!";
        playSuccessSound();
        animateSuccess();
    } else {
        feedback.textContent = "¡No!";
        playErrorSound();
        animateError();
    }

    scoreDisplay.textContent = score;
});

// timeout (no tocó)
function handleNoClick(isMatch) {
    if (!isMatch) {
        score++;
    } else {
        feedback.textContent = "¡Se te pasó!";
        playErrorSound();
        animateError();
    }
    scoreDisplay.textContent = score;
}

// reemplazo del setTimeout anterior
function nextRound() {
    if (round >= 10) {
        endGame();
        return;
    }

    feedback.textContent = "";
    canClick = true;

    const isMatch = sequence[round];
    round++;

    roundDisplay.textContent = round;

    const shape = shapes[Math.floor(Math.random() * shapes.length)];

    let color;
    if (isMatch) {
        color = targetColor;
    } else {
        const otherColors = colors.filter(c => c.name !== targetColor.name);
        color = otherColors[Math.floor(Math.random() * otherColors.length)];
    }

    gameArea.textContent = shape;
    gameArea.style.color = color.value;

    setTimeout(() => {
        if (canClick) {
            canClick = false;
            handleNoClick(isMatch);
        }
    }, 1800);
}

</script>
</body>
</html>
