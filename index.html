<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Concentración</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100 flex items-center justify-center h-screen select-none">

<div id="app" class="text-center">

    <!-- Pantalla inicio -->
    <div id="startScreen">
        <h1 class="text-3xl font-bold mb-4">🎯 Elegí el color</h1>
        <div id="colorOptions" class="flex flex-wrap justify-center gap-3 mb-4"></div>
    </div>

    <!-- Pantalla juego -->
    <div id="gameScreen" class="hidden">
        <h1 class="text-2xl font-bold mb-2">
            Tocá solo: <span id="targetColorText"></span>
        </h1>

        <button onclick="beginRounds()" class="bg-green-500 text-white px-6 py-3 rounded-xl text-xl mb-4 shadow">
            START
        </button>

        <p>Puntos: <span id="score">0</span></p>
        <p class="mb-4">Intento: <span id="round">0</span>/10</p>

        <div id="gameArea" class="w-64 h-64 flex items-center justify-center rounded-2xl bg-white shadow-lg text-6xl">
        </div>

        <p id="feedback" class="mt-4 text-xl font-semibold"></p>
    </div>

    <!-- Pantalla final -->
    <div id="endScreen" class="hidden">
        <h1 class="text-3xl font-bold mb-4">🎉 Fin del juego</h1>
        <p class="text-xl mb-4">Puntaje: <span id="finalScore"></span>/10</p>
        <button onclick="location.reload()" class="bg-blue-500 text-white px-6 py-3 rounded-xl text-xl shadow">
            Jugar de nuevo
        </button>
    </div>

</div>

<script>
const colors = [
    {name: "rojo", value: "#ef4444"},
    {name: "azul", value: "#3b82f6"},
    {name: "verde", value: "#22c55e"},
    {name: "amarillo", value: "#facc15"},
    {name: "violeta", value: "#a855f7"},
    {name: "rosa", value: "#ec4899"},
    {name: "naranja", value: "#f97316"},
    {name: "gris", value: "#6b7280"},
    {name: "negro", value: "#000000"},
    {name: "celeste", value: "#06b6d4"}
];

const shapes = ["●","■","▲","★"];

let targetColor = null;
let score = 0;
let round = 0;
let canClick = false;
let sequence = [];
let interval;

// UI
const colorOptions = document.getElementById("colorOptions");
const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");

const gameArea = document.getElementById("gameArea");
const scoreDisplay = document.getElementById("score");
const roundDisplay = document.getElementById("round");
const feedback = document.getElementById("feedback");
const finalScore = document.getElementById("finalScore");
const targetColorText = document.getElementById("targetColorText");

// Crear botones de colores
colors.forEach((c) => {
    const btn = document.createElement("button");
    btn.style.backgroundColor = c.value;
    btn.className = "w-10 h-10 rounded-full border-2";
    btn.onclick = () => {
        targetColor = c;

        document.querySelectorAll("#colorOptions button").forEach(b => b.classList.remove("ring-4"));
        btn.classList.add("ring-4");

        startScreen.classList.add("hidden");
        gameScreen.classList.remove("hidden");
        targetColorText.textContent = c.name;
    };
    colorOptions.appendChild(btn);
});

function beginRounds() {
    score = 0;
    round = 0;
    scoreDisplay.textContent = score;

    sequence = generateSequence();
    nextRound();

    interval = setInterval(nextRound, 2000);
}

// Genera secuencia con mínimo 4 aciertos
function generateSequence() {
    let seq = [];

    // 4 correctos seguros
    for (let i = 0; i < 4; i++) {
        seq.push(true);
    }

    // resto random
    for (let i = 4; i < 10; i++) {
        seq.push(Math.random() < 0.5);
    }

    // mezclar
    return seq.sort(() => Math.random() - 0.5);
}

function nextRound() {
    if (round >= 10) {
        endGame();
        return;
    }

    feedback.textContent = "";
    canClick = true;

    const isMatch = sequence[round];
    round++;

    roundDisplay.textContent = round;

    const shape = shapes[Math.floor(Math.random() * shapes.length)];

    let color;
    if (isMatch) {
        color = targetColor;
    } else {
        // elegir otro color distinto
        const otherColors = colors.filter(c => c.name !== targetColor.name);
        color = otherColors[Math.floor(Math.random() * otherColors.length)];
    }

    gameArea.textContent = shape;
    gameArea.style.color = color.value;

    setTimeout(() => {
        if (canClick) {
            if (!isMatch) {
                score++; // bien no tocar
            } else {
                feedback.textContent = "¡Se te pasó!";
            }
            scoreDisplay.textContent = score;
            canClick = false;
        }
    }, 1800);
}

gameArea.addEventListener("click", () => {
    if (!canClick) return;

    canClick = false;

    const isMatch = sequence[round - 1];

    if (isMatch) {
        score++;
        feedback.textContent = "¡Bien!";
    } else {
        feedback.textContent = "¡No!";
    }

    scoreDisplay.textContent = score;
});

function endGame() {
    clearInterval(interval);

    gameScreen.classList.add("hidden");
    endScreen.classList.remove("hidden");

    finalScore.textContent = score;
}
</script>

</body>
</html>
